<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thank You | JJM Scaffolding Ltd</title>

    <link rel="stylesheet" href="css/style.css">

    <style>
        .thank-you-page {
            min-height: 100vh;
            background: #05070a;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 40px 20px;
        }

        .thank-you-box {
            max-width: 700px;
            padding: 60px 40px;
            background: rgba(255,255,255,0.02);
            border: 1px solid rgba(192,192,192,0.18);
            border-radius: 16px;
        }

        .thank-you-box h1 {
            font-size: 3rem;
            margin-bottom: 20px;
        }

        .thank-you-box p {
            font-size: 1.2rem;
            color: rgba(255,255,255,0.75);
            line-height: 1.8;
            margin-bottom: 30px;
        }

        @media (max-width: 768px) {
            .thank-you-box h1 {
                font-size: 2rem;
            }

            .thank-you-box {
                padding: 40px 25px;
            }
        }
    </style>
</head>

<body>

<section class="thank-you-page">

    <div class="thank-you-box">

        <img src="images/logo.png"
             alt="JJM Scaffolding Ltd"
             style="width:160px; margin-bottom:30px;">

        <h1>Thank You</h1>

        <p>
            Your quote request has been sent successfully.
            A member of the JJM Scaffolding team will be in touch shortly.
        </p>

        <a href="index.html" class="primary-btn">
            Back To Homepage
        </a>

    </div>

</section>

</body>
</html>
